<section id="next-runnable" hx-get="{{ request.url_for('partial_next_runnable') }}" hx-trigger="every 30s, sse-next_runnable from:body" hx-swap="outerHTML">
  <h2>Next Runnable</h2>
  {% if data.next_runnable %}
  <p><a href="{{ request.url_for('ticket_detail', ticket_id=data.next_runnable.id) }}">{{ data.next_runnable.title }}</a></p>
  {% else %}
  <p class="empty">No runnable tickets.</p>
  {% endif %}
</section>
