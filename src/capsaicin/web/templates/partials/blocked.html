<section id="blocked" hx-get="/partials/blocked" hx-trigger="every 30s, sse-blocked from:body" hx-swap="outerHTML">
  {% if data.blocked_tickets %}
  <h2>Blocked ({{ data.blocked_tickets|length }})</h2>
  <table>
    <thead><tr><th>Ticket</th><th>Reason</th></tr></thead>
    <tbody>
      {% for t in data.blocked_tickets %}
      <tr>
        <td><a href="/tickets/{{ t.id }}">{{ t.title }}</a></td>
        <td>{{ t.blocked_reason or "unknown" }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <h2>Blocked</h2>
  <p class="empty">No blocked tickets.</p>
  {% endif %}
</section>
