<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}capsaicin{% endblock %}</title>
  <link rel="stylesheet" href="{{ request.url_for('static', path='style.css') }}">
  <script src="{{ request.url_for('static', path='htmx.min.js') }}"></script>
  <script>
  (function() {
    var saved = localStorage.getItem('capsaicin-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
  </script>
</head>
<body>
  <header>
    <nav>
      <a href="{{ request.url_for('dashboard') }}" class="brand" aria-label="capsaicin home">
        <img src="{{ request.url_for('static', path='brand/capsaicin-logo.svg') }}" alt="capsaicin">
      </a>
    </nav>
    <div class="header-controls">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
        <span id="theme-icon"></span>
      </button>
      <form method="post" action="{{ request.url_for('action_shutdown') }}"
            onsubmit="return confirm('Stop the capsaicin UI server?')">
        <button type="submit" class="theme-toggle" title="Stop server">Stop</button>
      </form>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
  function toggleTheme() {
    var html = document.documentElement;
    var current = html.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('capsaicin-theme', next);
    updateThemeIcon();
  }
  function updateThemeIcon() {
    var el = document.getElementById('theme-icon');
    if (!el) return;
    el.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? 'Light' : 'Dark';
  }
  updateThemeIcon();
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
    if (!localStorage.getItem('capsaicin-theme')) {
      document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
      updateThemeIcon();
    }
  });
  </script>
</body>
</html>
